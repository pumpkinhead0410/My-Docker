version: 0.1

storage:
  filesystem:
    rootdirectory: /var/lib/registry/
  delete:
    enabled: true
    
http:
  addr: 0.0.0.0:5000    

log:
  level: info
  
notifications:
  endpoints:
    - name: listener
      url: http://registry-web:8080/api/notification
      timeout: 500ms
      threshold: 5
      backoff: 1s  
